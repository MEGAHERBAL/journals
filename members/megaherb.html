<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEGAHERB - JOURNALS</title>
    <link rel="shortcut icon" href="https://journals.network/images/favicon.ico" type="image/x-icon">
    <link rel="icon" href="https://journals.network/images/favicon_32x32.png" sizes="32x32">
    <link rel="icon" href="https://journals.network/images/favicon_48x48.png" sizes="48x48">
    <link rel="icon" href="https://journals.network/images/favicon_96x96.png" sizes="96x96">
    <link rel="icon" href="https://journals.network/images/favicon_144x144.png" sizes="144x144">
    <style>
        @font-face {
            font-family: 'title-font';
            src: url('https://journals.network/fonts/NEXTYPE_v1.4 by SYIN.otf') format('opentype');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            color: #009076;
            font-family: 'Roboto Mono', monospace;
            min-height: 100vh;
            overflow: auto;
            background-image: url('../images/megaherb-page/megaherbbg.jpg');
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center;
            background-size: 100%;
        }

        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            width: 100%;
        }

        .header-spacer {
            height: 3vh;
        }

        .title-spacer {
            height: 3vh;
        }

        .footer-spacer {
            height: 18vh;
        }

        .title {
            text-align: center;
            font-family: 'title-font', serif;
            font-size: clamp(1.5rem, 4vw, 3rem);
            /* letter-spacing: -0.01em; */
            /* transform: scaleX(0.5); */
            width: 90%;
            min-width: 40vw;
            max-width: 60vw;
            margin: 0 auto;
            text-shadow:
                0 0 5px rgba(0, 66, 48, 0.8),
                0 0 10px rgba(237, 255, 245, 0.4),
                0 0 15px rgba(255, 255, 255, 0.2);
            height: 15vh;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }

        .content-box {
            background: #050003;
            border: 3px solid #ff6600fc;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
            padding: 3rem;
            max-width: 800px;
            text-align: left;
            transition: all 0.3s ease;
        }

        @media (max-aspect-ratio: 1/1) {
            .content-box {
                width: 95vw;
                max-width: min(95vw, 800px);
                padding: 2rem;
            }
        }

        .bio {
            margin-bottom: 2rem;
            font-size: 0.85rem;
            line-height: 1.6;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            text-align: center;
        }

        .info-grid {
            display: grid;
            grid-template-columns: max-content auto 1fr;
            gap: 1rem 1rem;
            align-items: start;
            width: fit-content;
            margin: 0 auto;
        }

        .highlight {
            margin: 2rem 0;
            text-align: center;
        }

        .label {
            text-align: right;
            font-size: 0.75rem;
        }

        .colon {
            text-align: center;
            font-size: 0.75rem;
        }

        .info {
            text-align: left;
            font-size: 0.75rem;
            word-break: break-all;
            overflow-wrap: break-word;
            hyphens: auto;
        }

        .info a {
            color: #fff;
            text-decoration: underline;
            word-break: break-all;
            overflow-wrap: break-word;
        }

        .return-link {
            margin-top: 2rem;
            text-align: center;
        }

        .return-link a {
            color: #fff;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="content">
        <div class="header-spacer"></div>
        <div class="title">MEGAHERB</div>
        <div class="title-spacer"></div>
        <div class="content-box">
            <div class="bio">🌿<br><br>it's safe to rest here</div>

            <div class="highlight">
                <iframe width="100%" height="100" scrolling="no" frameborder="no" allow="autoplay"
                    src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/soundcloud%253Atracks%253A2230329113&color=%23201f1f&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false&visual=true"></iframe>
                <div
                    style="font-size: 10px; color: #cccccc;line-break: anywhere;word-break: normal;overflow: auto;white-space: nowrap;text-overflow: ellipsis; font-family: Interstate,Lucida Grande,Lucida Sans Unicode,Lucida Sans,Garuda,Verdana,Tahoma,sans-serif;font-weight: 100;">
                    <a href="https://soundcloud.com/you-alright" title="MEGAHERB" target="_blank"
                        style="color: #cccccc; text-decoration: none;">MEGAHERB</a> · <a 
                        href="https://soundcloud.com/you-alright/aster"
                        title="Aster" target="_blank" 
                        style="color: #cccccc; text-decoration: none;">Aster</a></div>
            </div>

            <div class="info-grid">
                <div class="label">SoundCloud</div>
                <div class="colon">:</div>
                <div class="info"><a href="https://soundcloud.com/you-alright">https://soundcloud.com/you-alright</a></div>

                <div class="label">YouTube</div>
                <div class="colon">:</div>
                <div class="info"><a href="https://www.youtube.com/@MEGAHERBAL">https://www.youtube.com/@MEGAHERBAL</a></div>

                <div class="label">GitHub</div>
                <div class="colon">:</div>
                <div class="info"><a href="https://github.com/MEGAHERBAL">https://github.com/MEGAHERBAL</a></div>

                <div class="label">Bluesky</div>
                <div class="colon">:</div>
                <div class="info"><a href="https://bsky.app/profile/megaherb.journals.network">https://bsky.app/profile/megaherb.journals.network</a></div>
            </div>

            <div class="return-link">
                <a href="//journals.network">← Return to index</a>
            </div>
        </div>
        <div class="footer-spacer"></div>
    </div>
</body>

</html>
